<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="error-page">

    <div class="error-container">

        {% if error_code == 404 %}
            <img src="{{ url_for('static', filename='images/404.png') }}" class="error-img">
        {% else %}
            <img src="{{ url_for('static', filename='images/500.png') }}" class="error-img">
        {% endif %}

        <a href="/" class="error-btn">Back to Dashboard</a>

    </div>

</body>
</html>
