<!DOCTYPE html>
<html>
<head>
    <title>SecureScan</title>

    <link rel="icon" href="{{ url_for('static', filename='images/smalllogo.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <a href="/dashboard">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
        </a>
    </div>

    <div class="nav-right">
        {% if not is_guest %}
            <span class="total-scan-nav">Total Scan: {{ total_scans }}</span>
        {% endif %}

        <!-- 👤 PROFILE DROPDOWN -->
        <div class="profile-dropdown">
            <div class="user-box">
                👤 {{ username if username else 'Guest' }}
            </div>

            <div class="dropdown-menu">
                {% if is_guest %}
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                {% else %}
                    <a href="/logout">Logout</a>
                {% endif %}
            </div>
    </div>
</div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
