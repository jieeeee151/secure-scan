<!DOCTYPE html>
<html>
<head>
    <title>SecureScan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
    </div>

    <div class="nav-right">
        <a href="/history" class="nav-link">Scan History</a>

        <!-- 👤 PROFILE DROPDOWN -->
        <div class="profile-dropdown">
            <div class="user-box">
                👤 {{ username if username else 'Guest' }}
            </div>

            <div class="dropdown-menu">
                {% if is_guest %}
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                {% else %}
                    <a href="/logout">Logout</a>
                {% endif %}
            </div>
    </div>
</div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
