{% extends "base.html" %}

{% block content %}

<div class="checker-container">
    
<!-- 🔙 BACK -->
<div class="back-btn">
    <a href="/dashboard">← Back to Dashboard</a>
</div>

<!-- 🔥 TITLE -->
<div class="title-line"></div>
<h2 class="checker-title">PASSWORD CHECKER TOOL</h2>
<div class="title-line"></div>

<!-- 🔐 INPUT -->
<form method="POST">
    <label>Password</label>
    <input type="text" name="password" placeholder="Enter password" required>

    <button type="submit" class="main-btn">Check</button>
</form>

{% if error %}
    <p class="error-msg">{{ error }}</p>
{% endif %}

<!-- ✅ RESULT -->
{% if result %}
<div class="result-box">

    <p><strong>Strength:</strong> 
        <span class="
            {% if result == 'Weak ❌' %}weak
            {% elif result == 'Medium ⚠️' %}medium
            {% else %}strong{% endif %}
        ">
        {{ result }}
        </span>
    </p>

    <!-- 📊 ANIMATED BAR -->
    <div class="bar">
        <div class="bar-fill 
            {% if result == 'Weak ❌' %}weak-bar
            {% elif result == 'Medium ⚠️' %}medium-bar
            {% else %}strong-bar{% endif %}
        " style="width: {{ score * 25 }}%;"></div>
    </div>

    <!-- 📄 DOWNLOAD -->
    <button onclick="downloadReport()" class="download-btn">
        Download Report
    </button>

    {% if why and not is_guest %}
    <div class="why-box">
        <h4>Why this matters</h4>
        <p>{{ why }}</p>
    </div>
    {% endif %}

</div>
{% endif %}

<!-- 🔥 GENERATOR -->
<div class="generator-box">

    <button onclick="generatePassword()" class="main-btn">
        Generate Strong Password
    </button>

    <div id="generatedArea" style="display:none;">
        <input type="text" id="generatedPassword" readonly>

        <button onclick="copyPassword()" class="copy-btn">Copy</button>

        <p id="copyMsg" class="copy-msg"></p>
    </div>

</div>

</div>

<!-- 🔧 SCRIPT -->

<script>
function generatePassword() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
    let password = "";

    for (let i = 0; i < 12; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("generatedPassword").value = password;
    document.getElementById("generatedArea").style.display = "block";
}

function copyPassword() {
    const passwordField = document.getElementById("generatedPassword");

    navigator.clipboard.writeText(passwordField.value);

    document.getElementById("copyMsg").innerText = "✅ Password copied!";
}

function downloadReport() {
    const isGuest = {{ 'true' if is_guest else 'false' }};

    if (isGuest) {
        alert("Please login to download report");
        window.location.href = "/login";
    } else {
        window.location.href = "/download-report?tool=Password Checker&input={{ last_input }}&result={{ result }}&why={{ why }}";
    }
}
</script>

{% endblock %}
