<!DOCTYPE html>
<html>
<head>
    <title>Password Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h2>Password Strength Checker</h2>

<form method="POST">
    <input type="text" name="password" placeholder="Enter password" required>
    <button type="submit">Check</button>
</form>

{% if error %}
    <p style="color: red; font-weight: bold;">{{ error }}</p>
{% endif %}

<br>

{% if result %}
    <h3 style="color: {{ color }};">Result: {{ result }}</h3>

    <!-- ✅ UPDATED BUTTON -->
    <button onclick="downloadReport()">Download Report</button>
{% endif %}

{% if why and not is_guest %}
    <p><strong>Why This Matters:</strong></p>
    <p>{{ why }}</p>
{% endif %}

{% if score is not none %}
<div style="width: 300px; margin: auto; border: 1px solid #00ffcc;">
    <div style="width: {{ score * 25 }}%; background-color: #00ffcc; height: 20px;"></div>
</div>
<p>Risk Score: {{ score }}/4</p>
{% endif %}

<br>
<a href="/dashboard">Back to Dashboard</a>

<!-- ✅ SCRIPT (IMPORTANT) -->
<script>
function downloadReport() {
    const isGuest = {{ 'true' if is_guest else 'false' }};

    if (isGuest) {
        let confirmLogin = confirm("Please login to download report. Go to login page?");

        if (confirmLogin) {
            window.location.href = "/login";
        }
    } else {
        window.location.href = "/download-report?tool=Password Checker&input={{ last_input }}&result={{ result }}&why={{ why }}";
    }
}
</script>

</body>
</html>
