{% extends "base.html" %}
{% block content %}

<div class="back-btn">
    <a href="/dashboard">← Back to Dashboard</a>
</div>

<div class="title-container">
    <div class="title-line"></div>
    <h2 class="checker-title">PHISHING DETECTION TOOL</h2>
    <div class="title-line"></div>
</div>

<div class="checker-container">

<form method="POST">
    <label class="input-label">Website URL:</label>
    <input type="text" name="url" placeholder="Enter URL" value="{{ last_input }}" required>

    <button type="submit" class="main-btn">Scan</button>
</form>

{% if result %}
<div class="result-box">

    <p><strong>Result:</strong>
        <span class="{{ color }}">{{ result }}</span>
    </p>

    <div class="bar">
            {% if "Invalid" in result %}
                <div class="bar-fill weak-bar" style="width: 100%"></div>
            {% else %}
                <div class="bar-fill {{ color }}-bar" style="width: 60%"></div>
            {% endif %}
        </div>

    {% if why %}
    <div class="why-box">
        <strong>Why This Matters:</strong>
        <p>{{ why }}</p>
    </div>
    {% endif %}

    <button onclick="downloadReport()" class="main-btn">Download Report</button>

</div>
{% endif %}

</div>

<script>
function downloadReport() {
    const result = "{{ result }}";
    const why = "{{ why }}";
    const input = document.querySelector("input").value;
    const tool = "Phishing Detector";

    window.location.href = `/download-report?tool=${tool}&input=${input}&result=${result}&why=${why}`;
}

// 🔥 guest limit popup
{% if error == "LIMIT_REACHED" %}
    alert("Guest limit reached (5 scans). Please login or register.");
    window.location.href = "/login";
{% endif %}
</script>

{% endblock %}
